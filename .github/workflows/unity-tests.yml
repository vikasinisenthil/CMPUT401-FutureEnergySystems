name: Actions

on:
  pull_request:

  schedule:
    # Every 30 minutes from 10 PM – 7 AM Edmonton time
    - cron: "0,30 4-14 * * *"

jobs:
  build:
    name: Run Tests
    runs-on: self-hosted
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true

      # Test
      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # Output
      - uses: actions/upload-artifact@v4
        with:
          name: Build
          path: build

      # Cleanup
      - name: Cleanup
        run: sudo rm -rf /home/ubuntu/actions-runner/_work/_actions/actions/game-ci/*
